<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroInsight - Flight Price Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <div class="mobile-container">
            <header class="header">
                <h1>AeroInsight</h1>
                <p>Flight Price Prediction</p>
            </header>

            <main>
                <section class="card card-form">
                    <form id="flight-form">
                        <div class="form-group row">
                            <div class="input-block">
                                <label for="source">Source</label>
                                <select id="source" required>
                                    <option value="Delhi">Delhi</option>
                                    <option value="Mumbai">Mumbai</option>
                                    <option value="Bangalore">Bangalore</option>
                                    <option value="Chennai">Chennai</option>
                                    <option value="Kolkata">Kolkata</option>
                                </select>
                            </div>
                            <div class="input-block">
                                <label for="destination">Destination</label>
                                <select id="destination" required>
                                    <option value="Mumbai">Mumbai</option>
                                    <option value="Delhi">Delhi</option>
                                    <option value="Bangalore">Bangalore</option>
                                    <option value="Chennai">Chennai</option>
                                    <option value="Kolkata">Kolkata</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group row">
                            <div class="input-block">
                                <label for="date">Travel Date</label>
                                <input type="date" id="date" required>
                            </div>
                            <div class="input-block">
                                <label for="departure_time">Departure Time</label>
                                <input type="time" id="departure_time" value="08:00" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="airline">Airline</label>
                            <select id="airline" required>
                                <option value="IndiGo">IndiGo</option>
                                <option value="Air India">Air India</option>
                                <option value="Vistara">Vistara</option>
                                <option value="SpiceJet">SpiceJet</option>
                            </select>
                        </div>

                        <div class="form-group row">
                            <div class="input-block">
                                <label for="duration_minutes">Duration (mins)</label>
                                <input type="number" id="duration_minutes" min="30" max="1500" value="120" required>
                            </div>
                            <div class="input-block">
                                <label for="total_stops">Stops</label>
                                <input type="number" id="total_stops" min="0" max="4" value="0" required>
                            </div>
                        </div>

                        <button type="submit" class="primary-btn" id="predict-btn">
                            <span id="btn-text">Predict Price</span>
                            <div id="pred-loader" class="loader" style="display: none;"></div>
                        </button>
                    </form>
                </section>

                <section class="card card-result" id="prediction-result" style="display: none;">
                    <span class="result-label">Predicted Price</span>
                    <h2>₹<span id="price-display">--</span></h2>
                    <p id="recommendation-display" class="insight">Waiting...</p>
                </section>

                <section class="card card-chat">
                    <h3>Support Assistant</h3>
                    <div class="chat-window" id="chat-window">
                        <div class="chat-bubble bot">How can I help you today?</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Ask a question..." autocomplete="off">
                        <button id="send-chat">Send</button>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
